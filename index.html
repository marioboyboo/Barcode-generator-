<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barcode Generator</title>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            background: white;
            padding: 1.5rem;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            text-align: center;
            width: 100%;
            max-width: 450px; /* Limits width on desktop */
        }

        h2 { margin-top: 0; color: #1a1a1a; }
        p { color: #666; font-size: 0.9rem; }

        .input-group {
            margin-top: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        input, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e1e1e1;
            border-radius: 8px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus { border-color: #007bff; }

        .display-area {
            background: #fdfdfd;
            margin-top: 1.5rem;
            padding: 15px;
            border: 2px dashed #ddd;
            border-radius: 12px;
            min-height: 150px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden; /* Keeps large barcodes from breaking layout */
        }

        /* Makes the SVG scale down on small screens */
        #barcode {
            max-width: 100%;
            height: auto;
        }

        #error-msg {
            color: #d93025;
            font-size: 0.85rem;
            margin-top: 10px;
            display: none;
        }

        .download-btn {
            width: 100%;
            margin-top: 1.5rem;
            background-color: #1a1a1a;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.2s;
        }

        .download-btn:active { transform: scale(0.98); }
        .download-btn:hover { opacity: 0.9; }
    </style>
</head>
<body>

<div class="container">
    <h2>Barcode Maker</h2>
    <p>Generate and download barcodes instantly.</p>
    
    <div class="input-group">
        <input type="text" id="barcodeValue" placeholder="Enter text or numbers" oninput="generateBarcode()">
        <select id="barcodeType" onchange="generateBarcode()">
            <option value="CODE128">CODE128 (Most Versatile)</option>
            <option value="EAN13">EAN-13 (Needs 13 digits)</option>
            <option value="CODE39">CODE39 (Letters/Numbers)</option>
            <option value="ITF">ITF (Even numbers only)</option>
            <option value="MSI">MSI</option>
        </select>
    </div>

    <div class="display-area">
        <svg id="barcode"></svg>
        <div id="error-msg">Invalid data for this format.</div>
    </div>

    <button class="download-btn" onclick="downloadSVG()">Download SVG</button>
</div>

<script>
    function generateBarcode() {
        const value = document.getElementById('barcodeValue').value;
        const format = document.getElementById('barcodeType').value;
        const errorMsg = document.getElementById('error-msg');
        const barcodeElement = document.getElementById('barcode');

        if (value.trim() === "") {
            barcodeElement.style.display = "none";
            errorMsg.style.display = "none";
            return;
        }

        try {
            JsBarcode("#barcode", value, {
                format: format,
                lineColor: "#000",
                width: 2,
                height: 80,
                displayValue: true,
                fontSize: 16,
                // This ensures the generator throws an error if data is invalid
                valid: function(valid) {
                    if (valid) {
                        barcodeElement.style.display = "block";
                        errorMsg.style.display = "none";
                    } else {
                        throw new Error("Invalid");
                    }
                }
            });
        } catch (e) {
            barcodeElement.style.display = "none";
            errorMsg.style.display = "block";
        }
    }

    function downloadSVG() {
        const svg = document.getElementById("barcode");
        if (svg.style.display === "none") return;

        const svgData = new XMLSerializer().serializeToString(svg);
        const svgBlob = new Blob([svgData], {type:"image/svg+xml;charset=utf-8"});
        const svgUrl = URL.createObjectURL(svgBlob);
        const downloadLink = document.createElement("a");
        downloadLink.href = svgUrl;
        downloadLink.download = `barcode-${Date.now()}.svg`;
        document.body.appendChild(downloadLink);
        downloadLink.click();
        document.body.removeChild(downloadLink);
    }
    
    // Default starting value
    window.onload = () => {
        document.getElementById('barcodeValue').value = "12345678";
        generateBarcode();
    };
</script>

</body>
</html>
