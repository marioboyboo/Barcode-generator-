<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickCode | Barcode Generator</title>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
</head>
<body>

<div class="container">
    <h2>Barcode Generator</h2>
    <p>Enter text or numbers to generate your barcode.</p>
    
    <div class="input-group">
        <input type="text" id="barcodeValue" placeholder="e.g. 12345678" oninput="generateBarcode()">
        <select id="barcodeType" onchange="generateBarcode()">
            <option value="CODE128">CODE128 (Standard)</option>
            <option value="EAN13">EAN-13 (Retail)</option>
            <option value="CODE39">CODE39</option>
            <option value="ITF">ITF</option>
            <option value="pharmacode">Pharmacode</option>
        </select>
    </div>

    <div class="display-area">
        <svg id="barcode"></svg>
    </div>

    <button class="download-btn" onclick="downloadSVG()">Download SVG</button>
</div>

</body>
</html>
<style>
    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background-color: #f4f7f6;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
    }
    .container {
        background: white;
        padding: 2rem;
        border-radius: 12px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        text-align: center;
        width: 400px;
    }
    .input-group {
        margin-bottom: 1.5rem;
    }
    input, select {
        width: 100%;
        padding: 10px;
        margin-bottom: 10px;
        border: 1px solid #ddd;
        border-radius: 6px;
        box-sizing: border-box;
    }
    .display-area {
        background: #fafafa;
        padding: 20px;
        border: 1px dashed #ccc;
        border-radius: 8px;
        min-height: 100px;
        display: flex;
        justify-content: center;
        align-items: center;
    }
    .download-btn {
        margin-top: 1.5rem;
        background-color: #2c3e50;
        color: white;
        border: none;
        padding: 10px 20px;
        border-radius: 6px;
        cursor: pointer;
        transition: background 0.3s;
    }
    .download-btn:hover {
        background-color: #34495e;
    }
</style>
<script>
    function generateBarcode() {
        const value = document.getElementById('barcodeValue').value;
        const format = document.getElementById('barcodeType').value;

        if (value.trim() === "") {
            document.getElementById('barcode').innerHTML = "";
            return;
        }

        try {
            JsBarcode("#barcode", value, {
                format: format,
                lineColor: "#000",
                width: 2,
                height: 100,
                displayValue: true
            });
        } catch (e) {
            // Silently fail if the input doesn't match the format (e.g. EAN13 needs specific lengths)
        }
    }

    function downloadSVG() {
        const svg = document.getElementById("barcode");
        const svgData = new XMLSerializer().serializeToString(svg);
        const svgBlob = new Blob([svgData], {type:"image/svg+xml;charset=utf-8"});
        const svgUrl = URL.createObjectURL(svgBlob);
        const downloadLink = document.createElement("a");
        downloadLink.href = svgUrl;
        downloadLink.download = "barcode.svg";
        document.body.appendChild(downloadLink);
        downloadLink.click();
        document.body.removeChild(downloadLink);
    }
    
    // Initialize with a default value
    window.onload = () => {
        document.getElementById('barcodeValue').value = "HELLO-WORLD";
        generateBarcode();
    };
</script>
